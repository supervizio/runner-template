name: External E2E (dispatched)

# =============================================================================
# Runs another (PRIVATE) repo's E2E on this PUBLIC repo's FREE, unlimited
# GitHub-hosted runners (native linux/windows/macos amd64+arm64 + BSD via QEMU,
# both amd64 AND arm64). Triggered ONLY by an authenticated repository_dispatch
# — never by a PR — so external forks can never reach the secrets below.
#
# Besides pass/fail, every leg emits a `metrics_report` JSON — the REAL value of
# every metric collected on that (os, arch) — uploaded as an artifact. Those
# artifacts are the ground truth from which the coverage plaquette is
# regenerated (no hand-authored assessment). They contain only ephemeral
# CI-runner / QEMU-VM system metrics — no secrets.
#
# SECURITY MODEL (public executor of private code — critical surface):
#   * repository_dispatch-only trigger; no pull_request / pull_request_target.
#   * LIBPROBE_REPO_TOKEN = fine-grained PAT, Contents:read + Commit statuses:write
#     on the SOURCE repo only. Checks out the private source; posts the result
#     back as a commit status on the source commit.
#   * Pass/fail travels via that commit status; the metric reports travel via
#     upload-artifact (non-sensitive, see above).
#   * Logs minimized (no --nocapture, RUST_BACKTRACE=0). The run is DELETED by
#     cleanup-external-e2e.yml AFTER the dispatcher has pulled the artifacts.
#   * Third-party actions pinned by commit SHA.
# =============================================================================

on:
  repository_dispatch:
    types: [run-external-e2e]
  # Manual trigger for validating this workflow on a feature branch BEFORE it is
  # merged to the default branch (repository_dispatch always runs the default
  # branch's copy). Inputs mirror the dispatch client_payload.
  workflow_dispatch:
    inputs:
      source_repo:
        description: "Source repo (e.g. supervizio/libprobe)"
        required: true
      source_sha:
        description: "Source commit SHA to check out"
        required: true
      source_run_id:
        description: "Source run id (for the status context)"
        required: false
        default: "manual"
      source_attempt:
        description: "Source run attempt"
        required: false
        default: "1"

permissions:
  contents: read

concurrency:
  group: external-e2e-${{ github.event.client_payload.source_repo || github.event.inputs.source_repo }}-${{ github.event.client_payload.source_run_id || github.event.inputs.source_run_id }}
  cancel-in-progress: true

env:
  SOURCE_REPO: ${{ github.event.client_payload.source_repo || github.event.inputs.source_repo }}
  SOURCE_SHA: ${{ github.event.client_payload.source_sha || github.event.inputs.source_sha }}
  SOURCE_RUN_ID: ${{ github.event.client_payload.source_run_id || github.event.inputs.source_run_id }}
  SOURCE_ATTEMPT: ${{ github.event.client_payload.source_attempt || github.event.inputs.source_attempt }}
  CHECK_NAME: e2e-public/${{ github.event.client_payload.source_run_id || github.event.inputs.source_run_id }}-${{ github.event.client_payload.source_attempt || github.event.inputs.source_attempt }}
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "0"
  # Full test suite: every unit + integration test (--lib --tests), including
  # the #[ignore]-gated E2E ones. Doctests are excluded (--doc) on purpose: they
  # are compile-checked examples, not functional tests, and one stale example in
  # the darwin backend would otherwise red the gate on macOS.
  TEST_CMD: "cargo test --release -p probe-platform --lib --tests -- --include-ignored"
  REPORT_CMD: "cargo run --release -p probe-platform --bin metrics_report"

jobs:
  # --- Ack: set the pending commit status immediately, so the source repo's
  # collect job knows the dispatch was received (even if the matrix later dies).
  ack:
    name: Ack (pending status)
    runs-on: ubuntu-24.04
    steps:
      - name: Set pending commit status on source
        env:
          GH_TOKEN: ${{ secrets.LIBPROBE_REPO_TOKEN }}
        run: |
          set -euo pipefail
          gh api -X POST "repos/${SOURCE_REPO}/statuses/${SOURCE_SHA}" \
            -f state="pending" \
            -f context="${CHECK_NAME}" \
            -f description="Dispatched from run ${SOURCE_RUN_ID}.${SOURCE_ATTEMPT}; matrix running." >/dev/null
          echo "pending status set"

  # --- Native legs: gating. Run the full suite, then emit the real metrics
  # report for this (os, arch) and upload it. Free hosted runners honor
  # rust-toolchain.toml via preinstalled rustup.
  native:
    name: e2e ${{ matrix.platform }}
    needs: [ack]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: linux-amd64,   runner: ubuntu-24.04 }
          - { platform: linux-arm64,   runner: ubuntu-24.04-arm }
          - { platform: windows-amd64, runner: windows-latest }
          - { platform: windows-arm64, runner: windows-11-arm }
          - { platform: macos-amd64,   runner: macos-26-intel }
          - { platform: macos-arm64,   runner: macos-26 }
    steps:
      - name: Checkout private source (ephemeral, no persisted creds)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ env.SOURCE_SHA }}
          token: ${{ secrets.LIBPROBE_REPO_TOKEN }}
          persist-credentials: false
      - name: Full test suite
        run: ${{ env.TEST_CMD }}
      - name: Generate metrics report (real ground-truth artifact)
        if: ${{ always() }}
        shell: bash
        run: ${{ env.REPORT_CMD }} > "report-${{ matrix.platform }}.json"
      - name: Upload metrics report
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: report-${{ matrix.platform }}
          path: report-${{ matrix.platform }}.json
          if-no-files-found: warn

  # --- BSD legs via QEMU (vmactions). Matched arch to host: amd64 on ubuntu-24.04,
  # arm64 on ubuntu-24.04-arm. Advisory (continue-on-error) — they report and emit
  # artifacts but do not gate. Each OS is its own job because `uses:` cannot be a
  # matrix expression (the action name differs per OS); the arch is the matrix.
  freebsd:
    name: e2e freebsd-${{ matrix.arch }}
    needs: [ack]
    runs-on: ${{ matrix.runner }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: amd64, runner: ubuntu-24.04,     vmarch: x86_64 }
          - { arch: arm64, runner: ubuntu-24.04-arm, vmarch: aarch64 }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ env.SOURCE_SHA }}
          token: ${{ secrets.LIBPROBE_REPO_TOKEN }}
          persist-credentials: false
      - uses: vmactions/freebsd-vm@5a72679103d223925653750faa878a143340fbd0 # v1.5.0
        with:
          usesh: true
          arch: ${{ matrix.vmarch }}
          copyback: true
          prepare: pkg install -y rust
          run: |
            ${{ env.TEST_CMD }} || true
            ${{ env.REPORT_CMD }} > report-freebsd-${{ matrix.arch }}.json
      - name: Upload metrics report
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: report-freebsd-${{ matrix.arch }}
          path: report-freebsd-${{ matrix.arch }}.json
          if-no-files-found: warn

  openbsd:
    name: e2e openbsd-${{ matrix.arch }}
    needs: [ack]
    runs-on: ${{ matrix.runner }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: amd64, runner: ubuntu-24.04,     vmarch: x86_64 }
          - { arch: arm64, runner: ubuntu-24.04-arm, vmarch: aarch64 }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ env.SOURCE_SHA }}
          token: ${{ secrets.LIBPROBE_REPO_TOKEN }}
          persist-credentials: false
      - uses: vmactions/openbsd-vm@18edb32f4e48dae5865d7b8b3a9587bc01218a20 # v1.4.4
        with:
          usesh: true
          arch: ${{ matrix.vmarch }}
          copyback: true
          prepare: pkg_add -I rust
          run: |
            ${{ env.TEST_CMD }} || true
            ${{ env.REPORT_CMD }} > report-openbsd-${{ matrix.arch }}.json
      - name: Upload metrics report
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: report-openbsd-${{ matrix.arch }}
          path: report-openbsd-${{ matrix.arch }}.json
          if-no-files-found: warn

  # NetBSD: amd64 is the guaranteed baseline. arm64 is attempted too (advisory) —
  # if vmactions ships no NetBSD/aarch64 image the leg fails harmlessly and only
  # the amd64 report is produced.
  netbsd:
    name: e2e netbsd-${{ matrix.arch }}
    needs: [ack]
    runs-on: ${{ matrix.runner }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: amd64, runner: ubuntu-24.04,     vmarch: x86_64 }
          - { arch: arm64, runner: ubuntu-24.04-arm, vmarch: aarch64 }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ env.SOURCE_SHA }}
          token: ${{ secrets.LIBPROBE_REPO_TOKEN }}
          persist-credentials: false
      - uses: vmactions/netbsd-vm@1d9767765fd3f986e6de3aff4b1148f0c3a45f01 # v1.4.1
        with:
          usesh: true
          arch: ${{ matrix.vmarch }}
          copyback: true
          prepare: /usr/sbin/pkg_add -I rust || pkgin -y install rust
          run: |
            ${{ env.TEST_CMD }} || true
            ${{ env.REPORT_CMD }} > report-netbsd-${{ matrix.arch }}.json
      - name: Upload metrics report
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: report-netbsd-${{ matrix.arch }}
          path: report-netbsd-${{ matrix.arch }}.json
          if-no-files-found: warn

  # --- Container legs: the same metrics are ALSO collected INSIDE Docker
  # containers (musl/glibc/scratch), so the report certifies what libprobe
  # captures under each libc + a no-OS image. metrics_report is built for the
  # matching target, then run inside the image; its JSON is extracted. Advisory.
  containers:
    name: e2e container-${{ matrix.distro }}
    needs: [ack]
    runs-on: ubuntu-24.04
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - { distro: ubuntu,  image: "ubuntu:24.04", target: x86_64-unknown-linux-gnu,  musl: false }
          - { distro: alpine,  image: "alpine:3.21",  target: x86_64-unknown-linux-musl, musl: true }
          - { distro: scratch, image: "scratch",      target: x86_64-unknown-linux-musl, musl: true }
    steps:
      - name: Checkout private source (ephemeral, no persisted creds)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ env.SOURCE_SHA }}
          token: ${{ secrets.LIBPROBE_REPO_TOKEN }}
          persist-credentials: false
      - name: Rust target + musl toolchain
        run: |
          set -euo pipefail
          rustup target add ${{ matrix.target }}
          if [ "${{ matrix.musl }}" = "true" ]; then
            sudo apt-get update -qq && sudo apt-get install -y musl-tools
          fi
      - name: Build metrics_report for ${{ matrix.distro }}
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc
          RUSTFLAGS: ${{ matrix.musl && '-C target-feature=+crt-static' || '' }}
        run: cargo build --release -p probe-platform --bin metrics_report --target ${{ matrix.target }}
      - name: Run metrics_report inside ${{ matrix.image }}
        run: |
          set -euo pipefail
          bin="target/${{ matrix.target }}/release/metrics_report"
          out="report-container-${{ matrix.distro }}.json"
          if [ "${{ matrix.distro }}" = "scratch" ]; then
            cp "$bin" mr
            printf 'FROM scratch\nCOPY mr /metrics_report\nENTRYPOINT ["/metrics_report"]\n' > Dockerfile.mr
            docker build -q -f Dockerfile.mr -t mr-scratch . >/dev/null
            docker run --rm mr-scratch > "$out"
          else
            docker run --rm -v "$PWD/$bin:/metrics_report:ro" ${{ matrix.image }} /metrics_report > "$out"
          fi
          echo "$(wc -c <"$out") bytes"; head -c 200 "$out"
      - name: Upload container report
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: report-container-${{ matrix.distro }}
          path: report-container-${{ matrix.distro }}.json
          if-no-files-found: warn

  # --- Collect: fuse every per-(os,arch) report into one `metrics-reports`
  # artifact the dispatcher downloads to regenerate the coverage plaquette.
  collect-reports:
    name: Collect metric reports
    needs: [native, freebsd, openbsd, netbsd, containers]
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    steps:
      - name: Download all per-leg reports
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: report-*
          path: reports
          merge-multiple: true
      - name: Summarize
        run: |
          set -euo pipefail
          echo "Collected reports:"; ls -la reports/ || true
          n=$(find reports -name '*.json' 2>/dev/null | wc -l)
          echo "report count: ${n}"
      - name: Bundle metrics-reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: metrics-reports
          path: reports/
          if-no-files-found: warn

  # --- Report: set the final source commit status. Overall = success iff every
  # native leg (incl. macos-amd64 on macos-26-intel) passed; BSD legs are advisory.
  # It does NOT `needs:` the BSD jobs: their verdict never affects `overall`, and
  # waiting on the emulated arm64-BSD QEMU legs (~3-4 h) would push the status past
  # the source repo's commit-status poll deadline. The status posts as soon as the
  # gating native legs finish; BSD rows in the table read whatever conclusion exists
  # at that instant (often still running) — purely informational.
  report:
    name: Report → source status
    needs: [ack, native]
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      actions: read
    steps:
      - name: Aggregate + set final commit status
        env:
          GH_TOKEN: ${{ secrets.LIBPROBE_REPO_TOKEN }}
          RT_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          native="linux-amd64 linux-arm64 windows-amd64 windows-arm64 macos-amd64 macos-arm64"
          # Read this run's job conclusions (own repo → RT_TOKEN / github.token).
          jobs=$(GH_TOKEN="$RT_TOKEN" gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" \
                  --jq '.jobs[] | select(.name|startswith("e2e ")) | "\(.name|ltrimstr("e2e "))|\(.conclusion)"')
          table=""; fails=0
          # native (gating)
          for p in $native; do
            c=$(printf '%s\n' "$jobs" | awk -F'|' -v p="$p" '$1==p{print $2; exit}')
            [ -z "$c" ] && c="missing"
            table="${table}| ${p} | ${c} | gating |\n"
            [ "$c" = "success" ] || fails=$((fails+1))
          done
          # advisory (BSD QEMU legs, amd64 + arm64 — reported, never gating)
          for p in freebsd-amd64 freebsd-arm64 openbsd-amd64 openbsd-arm64 netbsd-amd64 netbsd-arm64; do
            c=$(printf '%s\n' "$jobs" | awk -F'|' -v p="$p" '$1==p{print $2; exit}')
            [ -z "$c" ] && c="missing"
            table="${table}| ${p} | ${c} | advisory |\n"
          done
          if [ "$fails" -eq 0 ]; then overall=success; else overall=failure; fi
          printf '%b\n' "native: ${overall} (${fails} failing) — ${SOURCE_REPO}@${SOURCE_SHA}\n${table}"
          # Commit Status API: a fine-grained PAT can set statuses (Commit
          # statuses: write); it can NOT create check-runs.
          gh api -X POST "repos/${SOURCE_REPO}/statuses/${SOURCE_SHA}" \
            -f state="${overall}" \
            -f context="${CHECK_NAME}" \
            -f description="native e2e: ${overall} (${fails} failing)" \
            -f target_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >/dev/null
          echo "status set: ${overall}"
