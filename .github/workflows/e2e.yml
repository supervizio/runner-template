name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch/tag of agent to test'
        required: true
        default: 'main'
      run_id:
        description: 'Agent CI run ID for artifact download'
        required: true
      sha:
        description: 'Commit SHA for status reporting (optional)'
        required: false
      arm_only:
        description: 'Run only the arm64 e2e jobs (skip amd64/VM)'
        required: false
        default: 'false'
  repository_dispatch:
    types: [run-e2e]

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.event.client_payload.sha || inputs.sha || github.run_id }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # RESOLVE: Normalize inputs from workflow_dispatch vs repository_dispatch
  # ===========================================================================

  resolve:
    name: Resolve Inputs
    runs-on: ubuntu-24.04
    outputs:
      ref: ${{ steps.resolve.outputs.ref }}
      run_id: ${{ steps.resolve.outputs.run_id }}
      sha: ${{ steps.resolve.outputs.sha }}
    steps:
      - name: Resolve dispatch parameters
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ inputs.ref }}" >> "$GITHUB_OUTPUT"
            echo "run_id=${{ inputs.run_id }}" >> "$GITHUB_OUTPUT"
            echo "sha=${{ inputs.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.event.client_payload.ref }}" >> "$GITHUB_OUTPUT"
            echo "run_id=${{ github.event.client_payload.run_id }}" >> "$GITHUB_OUTPUT"
            echo "sha=${{ github.event.client_payload.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Display resolved parameters
        run: |
          echo "Agent ref:    ${{ steps.resolve.outputs.ref }}"
          echo "Agent run ID: ${{ steps.resolve.outputs.run_id }}"
          echo "Agent SHA:    ${{ steps.resolve.outputs.sha }}"

  # ===========================================================================
  # E2E DOCKER (amd64)
  # ===========================================================================

  e2e-docker:
    name: E2E Docker ${{ matrix.name }}
    needs: [resolve]
    if: ${{ github.event.inputs.arm_only != 'true' }}
    runs-on: supervizio-runner
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: debian-glibc
            dockerfile: Dockerfile.debian-script
            artifact: supervizio-linux-amd64
            description: "Debian with glibc (systemd)"
          - name: alpine-musl
            dockerfile: Dockerfile.alpine-script
            artifact: supervizio-linux-amd64-musl
            description: "Alpine with musl (OpenRC)"
          - name: scratch
            dockerfile: Dockerfile.scratch
            artifact: supervizio-linux-amd64-musl
            description: "Scratch (static binary, no OS)"
    steps:
      - name: Report status (pending)
        if: needs.resolve.outputs.sha != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.AGENT_REPO_TOKEN }}
        run: |
          [ -z "$GH_TOKEN" ] && { echo "AGENT_REPO_TOKEN not set, skipping"; exit 0; }
          curl -sf -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/supervizio/agent/statuses/${{ needs.resolve.outputs.sha }}" \
            -d '{"state":"pending","context":"e2e/docker/${{ matrix.name }}","description":"Running...","target_url":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'

      - name: Checkout agent code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: supervizio/agent
          ref: ${{ needs.resolve.outputs.ref }}
          token: ${{ secrets.AGENT_REPO_TOKEN }}

      - name: Download binary from zot (cross-repo)
        env:
          ARTIFACT_REGISTRY: 192.168.100.250:5000
          RUN_ID: ${{ needs.resolve.outputs.run_id }}
          ARTIFACT: ${{ matrix.artifact }}
        run: |
          set -euo pipefail
          mkdir -p bin
          # Agent CI publishes binaries to the self-hosted zot store (no GitHub
          # artifacts). This runner (supervizio-runner) is on the lab network.
          command -v oras >/dev/null 2>&1 || {
            v=1.2.0; a=$(uname -m); case "$a" in x86_64) oa=amd64;; aarch64|arm64) oa=arm64;; *) oa=amd64;; esac
            curl -fsSL "https://github.com/oras-project/oras/releases/download/v${v}/oras_${v}_linux_${oa}.tar.gz" | sudo tar xz -C /usr/local/bin oras
          }
          n=0; until oras pull --plain-http "$ARTIFACT_REGISTRY/run-${RUN_ID}/${ARTIFACT}:latest" -o bin; do
            n=$((n+1)); [ "$n" -ge 5 ] && { echo "::error::zot pull failed for ${ARTIFACT}"; exit 1; }
            echo "retry $n"; sleep $((n*8))
          done
          ls -la bin/

      - name: Prepare binary
        run: |
          ls -la bin/
          chmod +x bin/${{ matrix.artifact }}
          if [ "${{ matrix.dockerfile }}" = "Dockerfile.scratch" ]; then
            mv bin/${{ matrix.artifact }} bin/supervizio
          elif [ "${{ matrix.artifact }}" != "supervizio-linux-amd64" ]; then
            mv bin/${{ matrix.artifact }} bin/supervizio-linux-amd64
          fi
          file bin/supervizio* | head -5

      - name: Wait for Docker daemon (DinD)
        run: |
          # The dind sidecar's dockerd needs a few seconds to open
          # tcp://localhost:2375. Without this wait the first `docker build`
          # races dockerd startup and dies with "Cannot connect to the Docker
          # daemon" (issue #15). Probe `docker info` for up to 60s.
          for i in $(seq 1 30); do
            if docker info >/dev/null 2>&1; then
              echo "Docker daemon ready (attempt $i)"; exit 0
            fi
            echo "waiting for dockerd... ($i/30)"; sleep 2
          done
          echo "::error::Docker daemon (DinD) not reachable at ${DOCKER_HOST:-tcp://localhost:2375} after 60s"
          exit 1

      - name: Build container
        run: |
          docker build -f e2e/${{ matrix.dockerfile }} -t supervizio-e2e:${{ matrix.name }}-amd64 .

      - name: Test container startup
        run: |
          docker run --rm supervizio-e2e:${{ matrix.name }}-amd64

      - name: Validate probe metrics
        if: matrix.dockerfile != 'Dockerfile.scratch'
        run: |
          docker run --rm --entrypoint sh supervizio-e2e:${{ matrix.name }}-amd64 -c "
            set -e
            echo '=== System Info ==='
            uname -a
            cat /etc/os-release 2>/dev/null || true

            echo ''
            echo '=== Running --probe ==='
            OUTPUT=\$(/usr/local/bin/supervizio --probe 2>&1) || {
              echo 'ERROR: --probe failed'
              echo \"Output: \$OUTPUT\"
              exit 1
            }

            echo 'Raw JSON:'
            echo \"\$OUTPUT\"

            echo ''
            echo '=== Validation ==='
            echo \"\$OUTPUT\" | jq -e '.timestamp' > /dev/null && echo 'OK timestamp'
            echo \"\$OUTPUT\" | jq -e '.os.platform' > /dev/null && echo 'OK platform'
            echo \"\$OUTPUT\" | jq -r '.cpu.cores // \"null\"' | xargs -I {} echo 'cpu.cores = {}'

            echo \"\$OUTPUT\" | jq -e '.timestamp and .os.platform and .cpu.cores > 0' && \\
              echo 'OK Probe validation passed: ${{ matrix.description }}'
          "

      - name: Test scratch container (no shell)
        if: matrix.dockerfile == 'Dockerfile.scratch'
        run: |
          echo "=== Testing scratch container (static binary, no OS) ==="

          echo "--- Test --version ---"
          docker run --rm supervizio-e2e:scratch-amd64 --version
          echo "OK --version works"

          echo ""
          echo "--- Test --probe ---"
          OUTPUT=$(docker run --rm supervizio-e2e:scratch-amd64 --probe 2>&1) || {
            echo "ERROR: --probe failed"
            echo "Output: $OUTPUT"
            exit 1
          }
          echo "Probe output:"
          echo "$OUTPUT"

          echo ""
          echo "--- Validate JSON ---"
          echo "$OUTPUT" | jq -e '.timestamp' > /dev/null && echo "OK timestamp present"
          echo "$OUTPUT" | jq -e '.os.platform' > /dev/null && echo "OK platform present"
          echo "$OUTPUT" | jq -e '.cpu.cores > 0' > /dev/null && echo "OK cpu.cores > 0"
          echo "$OUTPUT" | jq -e '.memory.total_bytes > 0' > /dev/null && echo "OK memory.total_bytes > 0"

          echo ""
          echo "OK Scratch container tests passed"

      - name: Save probe capabilities
        if: always()
        continue-on-error: true
        run: |
          PLATFORM="docker-${{ matrix.name }}"
          if [ "${{ matrix.dockerfile }}" = "Dockerfile.scratch" ]; then
            OUTPUT=$(docker run --rm supervizio-e2e:scratch-amd64 --probe 2>/dev/null) || true
          else
            OUTPUT=$(docker run --rm --entrypoint sh supervizio-e2e:${{ matrix.name }}-amd64 -c \
              '/usr/local/bin/supervizio --probe 2>/dev/null') || true
          fi
          if [ -n "$OUTPUT" ] && echo "$OUTPUT" | jq -e '.' >/dev/null 2>&1; then
            echo "$OUTPUT" | jq --arg p "$PLATFORM" '. + {"_platform": $p}' > "probe-cap-${PLATFORM}.json"
          else
            printf '{"_platform":"%s","_error":true}\n' "$PLATFORM" > "probe-cap-${PLATFORM}.json"
          fi
          echo "Probe capabilities for ${PLATFORM}:"
          cat "probe-cap-${PLATFORM}.json" | jq -r '._platform, .container.is_containerized // "N/A", .os.platform // "N/A"' 2>/dev/null || true

      - name: Upload probe capabilities
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: probe-cap-docker-${{ matrix.name }}
          path: probe-cap-docker-${{ matrix.name }}.json
          retention-days: 1
          if-no-files-found: ignore

      - name: Report status (result)
        if: always() && needs.resolve.outputs.sha != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.AGENT_REPO_TOKEN }}
        run: |
          [ -z "$GH_TOKEN" ] && { echo "AGENT_REPO_TOKEN not set, skipping"; exit 0; }
          STATE="success"
          DESC="Passed"
          if [ "${{ job.status }}" != "success" ]; then
            STATE="failure"
            DESC="Failed"
          fi
          curl -sf -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/supervizio/agent/statuses/${{ needs.resolve.outputs.sha }}" \
            -d "{\"state\":\"$STATE\",\"context\":\"e2e/docker/${{ matrix.name }}\",\"description\":\"$DESC\",\"target_url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"

  # ===========================================================================
  # E2E DOCKER ARM64
  # ===========================================================================

  e2e-docker-arm64:
    name: E2E Docker arm64 ${{ matrix.name }}
    needs: [resolve]
    # GitHub-hosted native arm64 runner: real Docker (no DinD sidecar, no QEMU)
    # and a native aarch64 toolchain. The binary is built natively here rather
    # than pulled from the lab zot store (unreachable from a hosted runner).
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: debian-glibc
            dockerfile: Dockerfile.debian-script
            libc: glibc
            binary_name: supervizio-linux-amd64
            description: "Debian ARM64 with glibc (systemd)"
          - name: alpine-musl
            dockerfile: Dockerfile.alpine-script
            libc: musl
            binary_name: supervizio-linux-amd64
            description: "Alpine ARM64 with musl (OpenRC)"
          - name: scratch
            dockerfile: Dockerfile.scratch
            libc: musl
            binary_name: supervizio
            description: "Scratch ARM64 (static binary, no OS)"
    steps:
      - name: Report status (pending)
        if: needs.resolve.outputs.sha != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.AGENT_REPO_TOKEN }}
        run: |
          [ -z "$GH_TOKEN" ] && { echo "AGENT_REPO_TOKEN not set, skipping"; exit 0; }
          curl -sf -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/supervizio/agent/statuses/${{ needs.resolve.outputs.sha }}" \
            -d '{"state":"pending","context":"e2e/docker-arm64/${{ matrix.name }}","description":"Running...","target_url":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'

      - name: Checkout agent code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: supervizio/agent
          ref: ${{ needs.resolve.outputs.ref }}
          token: ${{ secrets.AGENT_REPO_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.26.0'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@56f84321dbccf38fb67ce29ab63e4754056677e0 # stable
        with:
          toolchain: stable
          components: rust-src

      - name: Generate Wire code
        run: |
          set -euo pipefail
          # wire_gen.go (InitializeApp) is generated, not checked in — the agent
          # CI runs this before every build. Mirror it here.
          go install github.com/google/wire/cmd/wire@v0.7.0
          export PATH="$(go env GOPATH)/bin:$PATH"
          cd src && wire ./internal/bootstrap/

      - name: Install Zig (musl static link)
        if: matrix.libc == 'musl'
        run: |
          set -euo pipefail
          # Mirror the agent CI: zig acts as the musl cross-cc, identical recipe
          # (just on a native aarch64 host instead of cross from x86).
          ZIG_VER=0.13.0
          curl -fsSL "https://ziglang.org/download/${ZIG_VER}/zig-linux-aarch64-${ZIG_VER}.tar.xz" | sudo tar -xJ -C /opt
          sudo ln -sf "/opt/zig-linux-aarch64-${ZIG_VER}/zig" /usr/local/bin/zig
          # The `ring` crate's build (via cc-rs) appends --target=<rust-triple>
          # (aarch64-unknown-linux-musl), which zig 0.13 cannot parse
          # ("UnknownOperatingSystem"). Our `-target aarch64-linux-musl` is the
          # authoritative one, so strip any incoming --target= before calling zig.
          sudo tee /usr/local/bin/zig-cc >/dev/null <<'ZCC'
          #!/bin/sh
          n=$#
          while [ "$n" -gt 0 ]; do a=$1; shift; case "$a" in --target=*) : ;; *) set -- "$@" "$a" ;; esac; n=$((n-1)); done
          exec zig cc -target aarch64-linux-musl "$@"
          ZCC
          sudo chmod +x /usr/local/bin/zig-cc
          zig version

      - name: Build supervizio natively (linux-arm64 ${{ matrix.libc }})
        run: |
          set -euo pipefail
          mkdir -p bin
          if [ "${{ matrix.libc }}" = "glibc" ]; then
            # Native aarch64 glibc — the Makefile defaults are correct here.
            make build
            cp "dist/bin/linux-arm64/supervizio" "bin/${{ matrix.binary_name }}"
          else
            # Native aarch64 musl static — same recipe as the agent CI build-cross
            # (zig-cc + build-std + external static link).
            ( cd src/lib/probe && RUSTC_BOOTSTRAP=1 CC=zig-cc cargo build \
                -Z build-std=std,panic_abort --release \
                --target aarch64-unknown-linux-musl --package probe-ffi )
            mkdir -p dist/lib/linux-arm64-musl
            cp src/lib/probe/target/aarch64-unknown-linux-musl/release/libprobe.a dist/lib/linux-arm64-musl/
            ( cd src && CGO_ENABLED=1 CC=zig-cc \
                CGO_CFLAGS="-I${GITHUB_WORKSPACE}/src/lib/probe/include" \
                CGO_LDFLAGS="-L${GITHUB_WORKSPACE}/dist/lib/linux-arm64-musl -lprobe -lm -lunwind" \
                go build -ldflags="-s -w -linkmode external -extldflags '-static'" \
                  -o "${GITHUB_WORKSPACE}/bin/${{ matrix.binary_name }}" ./cmd/agent )
          fi
          chmod +x "bin/${{ matrix.binary_name }}"
          file "bin/${{ matrix.binary_name }}"

      - name: Build container
        run: |
          # Native aarch64 host + native image: plain docker build, no QEMU.
          docker build -f e2e/${{ matrix.dockerfile }} -t supervizio-e2e:${{ matrix.name }}-arm64 .

      - name: Test container startup
        run: |
          docker run --rm --platform linux/arm64 supervizio-e2e:${{ matrix.name }}-arm64

      - name: Validate probe metrics
        if: matrix.dockerfile != 'Dockerfile.scratch'
        run: |
          docker run --rm --platform linux/arm64 --entrypoint sh supervizio-e2e:${{ matrix.name }}-arm64 -c "
            set -e
            echo '=== System Info ==='
            uname -a
            cat /etc/os-release 2>/dev/null || true

            echo ''
            echo '=== Running --probe ==='
            OUTPUT=\$(/usr/local/bin/supervizio --probe 2>&1) || {
              echo 'ERROR: --probe failed'
              echo \"Output: \$OUTPUT\"
              exit 1
            }

            echo 'Raw JSON:'
            echo \"\$OUTPUT\"

            echo ''
            echo '=== Validation ==='
            echo \"\$OUTPUT\" | jq -e '.timestamp' > /dev/null && echo 'OK timestamp'
            echo \"\$OUTPUT\" | jq -e '.os.platform' > /dev/null && echo 'OK platform'
            echo \"\$OUTPUT\" | jq -r '.cpu.cores // \"null\"' | xargs -I {} echo 'cpu.cores = {}'

            echo \"\$OUTPUT\" | jq -e '.timestamp and .os.platform and .cpu.cores > 0' && \\
              echo 'OK Probe validation passed: ${{ matrix.description }}'
          "

      - name: Test scratch container (no shell)
        if: matrix.dockerfile == 'Dockerfile.scratch'
        run: |
          echo "=== Testing scratch container (static binary, no OS) ==="

          echo "--- Test --version ---"
          docker run --rm --platform linux/arm64 supervizio-e2e:scratch-arm64 --version
          echo "OK --version works"

          echo ""
          echo "--- Test --probe ---"
          OUTPUT=$(docker run --rm --platform linux/arm64 supervizio-e2e:scratch-arm64 --probe 2>&1) || {
            echo "ERROR: --probe failed"
            echo "Output: $OUTPUT"
            exit 1
          }
          echo "Probe output:"
          echo "$OUTPUT"

          echo ""
          echo "--- Validate JSON ---"
          echo "$OUTPUT" | jq -e '.timestamp' > /dev/null && echo "OK timestamp present"
          echo "$OUTPUT" | jq -e '.os.platform' > /dev/null && echo "OK platform present"
          echo "$OUTPUT" | jq -e '.cpu.cores > 0' > /dev/null && echo "OK cpu.cores > 0"
          echo "$OUTPUT" | jq -e '.memory.total_bytes > 0' > /dev/null && echo "OK memory.total_bytes > 0"

          echo ""
          echo "OK Scratch ARM64 container tests passed"

      - name: Report status (result)
        if: always() && needs.resolve.outputs.sha != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.AGENT_REPO_TOKEN }}
        run: |
          [ -z "$GH_TOKEN" ] && { echo "AGENT_REPO_TOKEN not set, skipping"; exit 0; }
          STATE="success"
          DESC="Passed"
          if [ "${{ job.status }}" != "success" ]; then
            STATE="failure"
            DESC="Failed"
          fi
          curl -sf -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/supervizio/agent/statuses/${{ needs.resolve.outputs.sha }}" \
            -d "{\"state\":\"$STATE\",\"context\":\"e2e/docker-arm64/${{ matrix.name }}\",\"description\":\"$DESC\",\"target_url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"

  # ===========================================================================
  # E2E macOS (Intel)
  # ===========================================================================

  e2e-macos:
    name: E2E macOS x86_64
    needs: [resolve]
    if: ${{ github.event.inputs.arm_only != 'true' }}
    runs-on: supervizio-runner
    timeout-minutes: 20
    env:
      PROXMOX_API_URL: "https://192.168.100.1:8006/api2/json"
      PVE_AUTH: "PVEAPIToken=${{ secrets.CI_RUNNER_API_TOKEN_ID }}=${{ secrets.CI_RUNNER_API_TOKEN_SECRET }}"
      NODE: ${{ secrets.PROXMOX_NODE }}
      SSH_OPTS: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10"
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      ARTIFACT_REGISTRY: "192.168.100.250:5000"
      RUN_ID: ${{ needs.resolve.outputs.run_id }}
    steps:
      - name: Report status (pending)
        if: needs.resolve.outputs.sha != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.AGENT_REPO_TOKEN }}
        run: |
          [ -z "$GH_TOKEN" ] && { echo "AGENT_REPO_TOKEN not set, skipping"; exit 0; }
          curl -sf -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/supervizio/agent/statuses/${{ needs.resolve.outputs.sha }}" \
            -d '{"state":"pending","context":"e2e/macos-x86_64","description":"Running...","target_url":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'

      - name: Checkout runner-template (for VM scripts)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: runner-template

      - name: Acquire macOS VM (sequoia, lock)
        id: vm
        run: |
          chmod +x runner-template/.github/scripts/vm-acquire.sh
          runner-template/.github/scripts/vm-acquire.sh sequoia "${GITHUB_RUN_ID}_e2e-macos-x86_64"

      - name: Probe E2E on macOS (sequoia, exec via ssh)
        env:
          VM_IP: ${{ steps.vm.outputs.VM_IP }}
          SSH_USER: ${{ steps.vm.outputs.SSH_USER }}
        run: |
          set -euo pipefail
          # sequoia is an Intel macOS VM on the lab subnet, so it reaches the zot
          # store directly and runs the shipped darwin-amd64 binary natively. The
          # binary is pulled ON the VM (no scp from the pod) — "zot on every VM".
          ssh ${SSH_OPTS} "${SSH_USER}@${VM_IP}" \
            ARTIFACT_REGISTRY="$ARTIFACT_REGISTRY" RUN_ID="$RUN_ID" 'bash -s' <<'REMOTE'
          set -euo pipefail
          work="$HOME/svz-e2e"; rm -rf "$work"; mkdir -p "$work/bin"; cd "$work"
          export PATH="$work/bin:/opt/homebrew/bin:/usr/local/bin:$PATH"
          # oras (darwin) into a local dir — kodflow has no passwordless sudo.
          if ! command -v oras >/dev/null 2>&1; then
            v=1.2.0; a=$(uname -m); case "$a" in arm64) oa=arm64;; *) oa=amd64;; esac
            curl -fsSL "https://github.com/oras-project/oras/releases/download/v${v}/oras_${v}_darwin_${oa}.tar.gz" | tar xz -C bin oras
          fi
          # jq is on the dev snapshot; brew-install as a fallback if absent.
          command -v jq >/dev/null 2>&1 || brew install jq
          n=0; until oras pull --plain-http "$ARTIFACT_REGISTRY/run-${RUN_ID}/supervizio-darwin-amd64:latest" -o bin; do
            n=$((n+1)); [ "$n" -ge 5 ] && { echo "::error::zot pull failed for supervizio-darwin-amd64"; exit 1; }
            echo "retry $n"; sleep $((n*8))
          done
          chmod +x bin/supervizio-darwin-amd64
          mv bin/supervizio-darwin-amd64 bin/supervizio
          echo "=== System ==="; uname -a; sw_vers || true
          echo "=== version ==="; bin/supervizio --version
          echo "=== probe ==="
          OUT=$(bin/supervizio --probe 2>&1) || { echo "::error::probe failed: $OUT"; exit 1; }
          echo "$OUT" | jq -e 'type=="object"' >/dev/null
          echo "$OUT" | jq -e '.timestamp and .os.platform and .cpu.cores > 0' \
            && echo "OK probe validation passed on macOS x86_64"
          echo "$OUT" | jq --arg p darwin-amd64 '. + {"_platform":$p}' > "$work/probe-cap-darwin-amd64.json"
          REMOTE

      - name: Fetch probe capabilities from VM
        if: always()
        continue-on-error: true
        env:
          VM_IP: ${{ steps.vm.outputs.VM_IP }}
          SSH_USER: ${{ steps.vm.outputs.SSH_USER }}
        run: |
          scp -O ${SSH_OPTS} "${SSH_USER}@${VM_IP}:svz-e2e/probe-cap-darwin-amd64.json" probe-cap-darwin-amd64.json \
            || printf '{"_platform":"darwin-amd64","_error":true}\n' > probe-cap-darwin-amd64.json

      - name: Upload probe capabilities
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: probe-cap-darwin-amd64
          path: probe-cap-darwin-amd64.json
          retention-days: 1
          if-no-files-found: ignore

      - name: Release macOS VM (lock)
        if: always()
        run: |
          chmod +x runner-template/.github/scripts/vm-release.sh
          runner-template/.github/scripts/vm-release.sh "${{ steps.vm.outputs.VMID || 'sequoia' }}" || true

      - name: Report status (result)
        if: always() && needs.resolve.outputs.sha != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.AGENT_REPO_TOKEN }}
        run: |
          [ -z "$GH_TOKEN" ] && { echo "AGENT_REPO_TOKEN not set, skipping"; exit 0; }
          STATE="success"; DESC="Passed"
          if [ "${{ job.status }}" != "success" ]; then STATE="failure"; DESC="Failed"; fi
          curl -sf -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/supervizio/agent/statuses/${{ needs.resolve.outputs.sha }}" \
            -d "{\"state\":\"$STATE\",\"context\":\"e2e/macos-x86_64\",\"description\":\"$DESC\",\"target_url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"

  # ===========================================================================
  # E2E macOS ARM64 (Apple Silicon)
  # ===========================================================================

  e2e-macos-arm64:
    name: E2E macOS ARM64
    needs: [resolve]
    runs-on: macos-15
    timeout-minutes: 10
    steps:
      - name: Report status (pending)
        if: needs.resolve.outputs.sha != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.AGENT_REPO_TOKEN }}
        run: |
          [ -z "$GH_TOKEN" ] && { echo "AGENT_REPO_TOKEN not set, skipping"; exit 0; }
          curl -sf -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/supervizio/agent/statuses/${{ needs.resolve.outputs.sha }}" \
            -d '{"state":"pending","context":"e2e/macos-arm64","description":"Running...","target_url":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'

      - name: Checkout agent code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: supervizio/agent
          ref: ${{ needs.resolve.outputs.ref }}
          token: ${{ secrets.AGENT_REPO_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.26.0'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@56f84321dbccf38fb67ce29ab63e4754056677e0 # stable
        with:
          toolchain: stable
          components: rust-src

      - name: Generate Wire code
        run: |
          set -euo pipefail
          # wire_gen.go (InitializeApp) is generated, not checked in.
          go install github.com/google/wire/cmd/wire@v0.7.0
          export PATH="$(go env GOPATH)/bin:$PATH"
          cd src && wire ./internal/bootstrap/

      - name: Build supervizio natively (darwin-arm64)
        run: |
          set -euo pipefail
          # macos-15 is real Apple Silicon — build libprobe.a + the Go agent
          # NATIVELY for darwin-arm64. No GitHub artifacts (the agent CI publishes
          # only to the lab zot store, unreachable from this hosted runner) and no
          # cross-compilation. Frameworks are passed explicitly because the
          # Makefile's default CGO_LDFLAGS is linux-only (-ldl etc.).
          make build-probe
          mkdir -p bin
          cd src && CGO_ENABLED=1 \
            CGO_CFLAGS="-I${GITHUB_WORKSPACE}/src/lib/probe/include" \
            CGO_LDFLAGS="-L${GITHUB_WORKSPACE}/dist/lib/darwin-arm64 -lprobe -framework IOKit -framework CoreFoundation -framework Metal" \
            go build -ldflags="-s -w" -o "${GITHUB_WORKSPACE}/bin/supervizio" ./cmd/agent
          file "${GITHUB_WORKSPACE}/bin/supervizio"

      - name: Run macOS ARM64 E2E test
        run: |
          set -euo pipefail
          export PATH="$PWD/bin:$PATH"
          chmod +x bin/supervizio

          echo "=== System Info ==="
          uname -a
          sysctl hw.ncpu || true
          sw_vers || true

          echo ""
          echo "=== Test version ==="
          bin/supervizio --version

          echo ""
          echo "=== Test probe ==="
          OUTPUT=$(bin/supervizio --probe 2>&1) || {
            echo "ERROR: --probe command failed with exit code $?"
            echo "Output: $OUTPUT"
            exit 1
          }

          echo "Raw JSON output:"
          echo "$OUTPUT"

          echo ""
          echo "=== Validate JSON structure ==="
          echo "$OUTPUT" | jq -e 'type == "object"' > /dev/null || {
            echo "ERROR: Output is not valid JSON object"
            exit 1
          }

          echo "Checking required fields..."
          echo "$OUTPUT" | jq -e '.timestamp' > /dev/null && echo "OK timestamp present"
          echo "$OUTPUT" | jq -e '.os.platform' > /dev/null && echo "OK platform present"
          echo "$OUTPUT" | jq -e '.cpu' > /dev/null && echo "OK cpu present" || echo "FAIL cpu MISSING"
          echo "$OUTPUT" | jq -r '.cpu.cores // "null"' | xargs -I {} echo "  cpu.cores = {}"

          echo ""
          echo "=== Final validation ==="
          echo "$OUTPUT" | jq -e '.timestamp and .os.platform and .cpu.cores > 0' && \
            echo "OK Probe validation passed on macOS ARM64"

      - name: Save probe capabilities
        if: always()
        continue-on-error: true
        run: |
          PLATFORM="darwin-arm64"
          OUTPUT=$(./bin/supervizio --probe 2>/dev/null) || true
          if [ -n "$OUTPUT" ] && echo "$OUTPUT" | jq -e '.' >/dev/null 2>&1; then
            echo "$OUTPUT" | jq --arg p "$PLATFORM" '. + {"_platform": $p}' > "probe-cap-${PLATFORM}.json"
          else
            printf '{"_platform":"%s","_error":true}\n' "$PLATFORM" > "probe-cap-${PLATFORM}.json"
          fi

      - name: Upload probe capabilities
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: probe-cap-darwin-arm64
          path: probe-cap-darwin-arm64.json
          retention-days: 1
          if-no-files-found: ignore

      - name: Supervision scenarios
        run: |
          # Prove the supervisor's restart/exit/limit/SIGKILL reactions on macOS.
          chmod +x e2e/scenario-battery.sh
          e2e/scenario-battery.sh "$PWD/bin/supervizio"

      - name: Report status (result)
        if: always() && needs.resolve.outputs.sha != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.AGENT_REPO_TOKEN }}
        run: |
          [ -z "$GH_TOKEN" ] && { echo "AGENT_REPO_TOKEN not set, skipping"; exit 0; }
          STATE="success"
          DESC="Passed"
          if [ "${{ job.status }}" != "success" ]; then
            STATE="failure"
            DESC="Failed"
          fi
          curl -sf -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/supervizio/agent/statuses/${{ needs.resolve.outputs.sha }}" \
            -d "{\"state\":\"$STATE\",\"context\":\"e2e/macos-arm64\",\"description\":\"$DESC\",\"target_url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"

  # ===========================================================================
  # E2E WINDOWS (Proxmox VM via SSH + PowerShell)
  # NOTE: authored mirroring agent/build-windows-native; validate on first run.
  # ===========================================================================

  e2e-windows:
    name: E2E Windows ${{ matrix.name }}
    needs: [resolve]
    runs-on: supervizio-runner
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-server
    env:
      PROXMOX_API_URL: "https://192.168.100.1:8006/api2/json"
      PVE_AUTH: "PVEAPIToken=${{ secrets.CI_RUNNER_API_TOKEN_ID }}=${{ secrets.CI_RUNNER_API_TOKEN_SECRET }}"
      NODE: ${{ secrets.PROXMOX_NODE }}
      # Keepalive: the supervision battery runs S1-S8 in one long SSH session
      # (S6 backoff sleeps, S7 rotation, S8 health all add idle time); without it
      # the Windows OpenSSH server drops the idle session ("closed by remote host",
      # exit 255) even though the scenarios pass.
      SSH_OPTS: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=15 -o ServerAliveInterval=15 -o ServerAliveCountMax=8"
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Report status (pending)
        if: needs.resolve.outputs.sha != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.AGENT_REPO_TOKEN }}
        run: |
          [ -z "$GH_TOKEN" ] && exit 0
          curl -sf -X POST -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/supervizio/agent/statuses/${{ needs.resolve.outputs.sha }}" \
            -d '{"state":"pending","context":"e2e/windows/${{ matrix.name }}","description":"Running...","target_url":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'

      - name: Checkout agent code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: supervizio/agent
          ref: ${{ needs.resolve.outputs.ref }}
          token: ${{ secrets.AGENT_REPO_TOKEN }}
          path: agent

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.CI_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Download Windows binary from zot (cross-repo)
        env:
          ARTIFACT_REGISTRY: 192.168.100.250:5000
          RUN_ID: ${{ needs.resolve.outputs.run_id }}
          ARTIFACT: supervizio-windows-amd64
        run: |
          set -euo pipefail
          mkdir -p bin
          # Agent CI publishes binaries to the self-hosted zot store (no GitHub
          # artifacts). This runner (supervizio-runner) is on the lab network.
          command -v oras >/dev/null 2>&1 || {
            v=1.2.0; a=$(uname -m); case "$a" in x86_64) oa=amd64;; aarch64|arm64) oa=arm64;; *) oa=amd64;; esac
            curl -fsSL "https://github.com/oras-project/oras/releases/download/v${v}/oras_${v}_linux_${oa}.tar.gz" | sudo tar xz -C /usr/local/bin oras
          }
          n=0; until oras pull --plain-http "$ARTIFACT_REGISTRY/run-${RUN_ID}/${ARTIFACT}:latest" -o bin; do
            n=$((n+1)); [ "$n" -ge 5 ] && { echo "::error::zot pull failed for ${ARTIFACT}"; exit 1; }
            echo "retry $n"; sleep $((n*8))
          done
          ls -la bin/

      - name: Acquire VM (lock)
        id: vm
        run: |
          chmod +x agent/.github/scripts/vm-acquire.sh
          agent/.github/scripts/vm-acquire.sh "${{ matrix.name }}" "${GITHUB_RUN_ID}_e2e-win-${{ matrix.name }}"

      - name: Supervision scenarios (PowerShell)
        run: |
          BIN=$(find bin -name 'supervizio-windows-amd64*' | head -1)
          ssh ${SSH_OPTS} ${SSH_USER}@${VM_IP} "powershell -NoProfile -Command \"New-Item -ItemType Directory -Force -Path 'C:\\build' | Out-Null\""
          scp ${SSH_OPTS} "$BIN" ${SSH_USER}@${VM_IP}:C:/build/supervizio.exe
          scp ${SSH_OPTS} agent/e2e/scenario-battery.ps1 ${SSH_USER}@${VM_IP}:C:/build/scenario-battery.ps1
          ssh ${SSH_OPTS} ${SSH_USER}@${VM_IP} "powershell -NoProfile -ExecutionPolicy Bypass -File C:\\build\\scenario-battery.ps1 -Sv C:\\build\\supervizio.exe"

      - name: Release VM (unlock)
        if: always()
        run: |
          chmod +x agent/.github/scripts/vm-release.sh
          agent/.github/scripts/vm-release.sh "${{ steps.vm.outputs.VMID || matrix.name }}"

      - name: Report status (result)
        if: always() && needs.resolve.outputs.sha != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.AGENT_REPO_TOKEN }}
        run: |
          [ -z "$GH_TOKEN" ] && exit 0
          STATE="success"; DESC="Passed"
          if [ "${{ job.status }}" != "success" ]; then STATE="failure"; DESC="Failed"; fi
          curl -sf -X POST -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/supervizio/agent/statuses/${{ needs.resolve.outputs.sha }}" \
            -d "{\"state\":\"$STATE\",\"context\":\"e2e/windows/${{ matrix.name }}\",\"description\":\"$DESC\",\"target_url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"

  # ===========================================================================
  # E2E VM TESTS (Proxmox, self-hosted)
  # ===========================================================================

  e2e-vm:
    name: E2E VM ${{ matrix.name }}
    needs: [resolve]
    if: ${{ github.event.inputs.arm_only != 'true' }}
    runs-on: supervizio-runner
    timeout-minutes: 15
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        include:
          - name: alpine-openrc
            binary_artifact: supervizio-linux-amd64-musl
            pkg_artifact: supervizio-amd64.apk
            pkg_ext: apk
          - name: alpine-s6
            binary_artifact: supervizio-linux-amd64-musl
            pkg_artifact: supervizio-amd64.apk
            pkg_ext: apk
          # NOTE: arch-systemd is intentionally omitted — the lab has no arch
          # template and no VM by that name, so its leg failed "Acquire VM (lock)"
          # on every run (deterministic red). Re-add once an arch VM is provisioned
          # and appears in `qm list`. (artix-dinit IS kept below — VMID 208 is a
          # real, provisioned test VM with base+dev snapshots.)
          - name: artix-dinit
            binary_artifact: supervizio-linux-amd64
            pkg_artifact: supervizio-amd64.pkg.tar.zst
            pkg_ext: pkg.tar.zst
          - name: debian-systemd
            binary_artifact: supervizio-linux-amd64
            pkg_artifact: supervizio-amd64.deb
            pkg_ext: deb
          - name: debian-sysvinit
            binary_artifact: supervizio-linux-amd64
            pkg_artifact: supervizio-amd64.deb
            pkg_ext: deb
          - name: fedora-systemd
            binary_artifact: supervizio-linux-amd64
            pkg_artifact: supervizio-amd64.rpm
            pkg_ext: rpm
          - name: opensuse-systemd
            binary_artifact: supervizio-linux-amd64
            pkg_artifact: supervizio-amd64.rpm
            pkg_ext: rpm
          - name: alpine-runit
            binary_artifact: supervizio-linux-amd64-musl
            pkg_artifact: supervizio-amd64.apk
            pkg_ext: apk
          - name: freebsd
            binary_artifact: supervizio-freebsd-amd64
            pkg_artifact: ""
            pkg_ext: ""
          - name: openbsd
            binary_artifact: supervizio-openbsd-amd64
            pkg_artifact: ""
            pkg_ext: ""
          - name: netbsd
            binary_artifact: supervizio-netbsd-amd64
            pkg_artifact: ""
            pkg_ext: ""
    env:
      PROXMOX_API_URL: "https://192.168.100.1:8006/api2/json"
      PVE_AUTH: "PVEAPIToken=${{ secrets.CI_RUNNER_API_TOKEN_ID }}=${{ secrets.CI_RUNNER_API_TOKEN_SECRET }}"
      NODE: ${{ secrets.PROXMOX_NODE }}
      SSH_OPTS: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10"
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Report status (pending)
        if: needs.resolve.outputs.sha != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.AGENT_REPO_TOKEN }}
        run: |
          [ -z "$GH_TOKEN" ] && { echo "AGENT_REPO_TOKEN not set, skipping"; exit 0; }
          curl -sf -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/supervizio/agent/statuses/${{ needs.resolve.outputs.sha }}" \
            -d '{"state":"pending","context":"e2e/vm/${{ matrix.name }}","description":"Running...","target_url":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'

      - name: Checkout runner-template (for VM scripts)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: runner-template

      - name: Checkout agent code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: supervizio/agent
          ref: ${{ needs.resolve.outputs.ref }}
          token: ${{ secrets.AGENT_REPO_TOKEN }}
          path: agent

      - name: Install oras (zot client)
        run: |
          set -euo pipefail
          command -v oras >/dev/null 2>&1 || {
            v=1.2.0; a=$(uname -m); case "$a" in x86_64) oa=amd64;; aarch64|arm64) oa=arm64;; *) oa=amd64;; esac
            curl -fsSL "https://github.com/oras-project/oras/releases/download/v${v}/oras_${v}_linux_${oa}.tar.gz" | sudo tar xz -C /usr/local/bin oras
          }

      - name: Download package from zot
        if: matrix.pkg_artifact != ''
        continue-on-error: true
        id: download-pkg
        env:
          ARTIFACT_REGISTRY: 192.168.100.250:5000
          RUN_ID: ${{ needs.resolve.outputs.run_id }}
          ARTIFACT: ${{ matrix.pkg_artifact }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/
          oras pull --plain-http "$ARTIFACT_REGISTRY/run-${RUN_ID}/${ARTIFACT}:latest" -o artifacts/

      - name: Download binary from zot (fallback)
        continue-on-error: true
        id: download-bin
        env:
          ARTIFACT_REGISTRY: 192.168.100.250:5000
          RUN_ID: ${{ needs.resolve.outputs.run_id }}
          ARTIFACT: ${{ matrix.binary_artifact }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/
          oras pull --plain-http "$ARTIFACT_REGISTRY/run-${RUN_ID}/${ARTIFACT}:latest" -o artifacts/

      - name: Prepare artifacts
        run: |
          echo "=== Available artifacts ==="
          ls -la artifacts/ 2>/dev/null || echo "No artifacts found"

          # Find the package or binary to deploy
          if [ -n "${{ matrix.pkg_ext }}" ]; then
            PKG_FILE=$(find artifacts/ -name "*.${{ matrix.pkg_ext }}" 2>/dev/null | head -1)
            if [ -n "$PKG_FILE" ]; then
              echo "PKG_FILE=$PKG_FILE" >> "$GITHUB_ENV"
              echo "DEPLOY_MODE=package" >> "$GITHUB_ENV"
              echo "Found package: $PKG_FILE"
            else
              echo "Package not found, falling back to binary"
              echo "DEPLOY_MODE=binary" >> "$GITHUB_ENV"
            fi
          else
            echo "DEPLOY_MODE=binary" >> "$GITHUB_ENV"
          fi

          # Find binary (use matrix.binary_artifact name to avoid picking wrong platform)
          BIN_FILE=$(find artifacts/ -name "${{ matrix.binary_artifact }}" 2>/dev/null | head -1)
          if [ -z "$BIN_FILE" ]; then
            # Fallback: generic search if exact name not found
            BIN_FILE=$(find artifacts/ -name "supervizio-*" -not -name "*.deb" -not -name "*.rpm" -not -name "*.apk" -not -name "*.pkg.tar.zst" -not -name "*.xbps" 2>/dev/null | head -1)
          fi
          if [ -n "$BIN_FILE" ]; then
            chmod +x "$BIN_FILE"
            echo "BIN_FILE=$BIN_FILE" >> "$GITHUB_ENV"
            echo "Found binary: $BIN_FILE"
          fi

      - name: Acquire VM (lock)
        id: vm
        run: |
          chmod +x runner-template/.github/scripts/vm-acquire.sh
          runner-template/.github/scripts/vm-acquire.sh "${{ matrix.name }}" "${GITHUB_RUN_ID}_e2e-vm-${{ matrix.name }}"

      - name: SCP files to VM
        run: |
          # Retry helper for transient SSH/SCP failures
          retry() {
            local n=0 max=3
            while [ $n -lt $max ]; do
              "$@" && return 0
              n=$((n + 1))
              echo "Retry $n/$max..."
              sleep 5
            done
            echo "Failed after $max attempts: $*"
            return 1
          }

          # Use -O (legacy SCP protocol) for VMs without SFTP subsystem
          SCP_CMD="scp -O ${SSH_OPTS}"

          # Clean previous files to prevent SCP nesting / stale-file issues. A
          # leftover /tmp/scenario-battery.sh from an earlier run made scp fail
          # with "Permission denied" (it was missing from this cleanup list).
          ssh ${SSH_OPTS} root@${VM_IP} "rm -rf /tmp/setup /tmp/validate-probe.sh /tmp/supervizio* /tmp/scenario-battery.sh" || true

          # Copy setup scripts (from agent repo checkout)
          retry ${SCP_CMD} -r agent/setup root@${VM_IP}:/tmp/setup

          # Copy test scripts (from agent repo checkout)
          retry ${SCP_CMD} agent/e2e/validate-probe.sh root@${VM_IP}:/tmp/validate-probe.sh
          retry ${SCP_CMD} agent/e2e/scenario-battery.sh root@${VM_IP}:/tmp/scenario-battery.sh

          # Copy package if available
          if [ "$DEPLOY_MODE" = "package" ] && [ -n "${PKG_FILE:-}" ]; then
            retry ${SCP_CMD} "$PKG_FILE" root@${VM_IP}:/tmp/supervizio.${{ matrix.pkg_ext }}
            echo "Copied package: $PKG_FILE"
          fi

          # Always copy binary as fallback
          if [ -n "${BIN_FILE:-}" ]; then
            retry ${SCP_CMD} "$BIN_FILE" root@${VM_IP}:/tmp/supervizio
            ssh ${SSH_OPTS} root@${VM_IP} "chmod +x /tmp/supervizio"
            echo "Copied binary: $BIN_FILE"
          fi

          # Fail if nothing was copied
          if [ -z "${PKG_FILE:-}" ] && [ -z "${BIN_FILE:-}" ]; then
            echo "ERROR: No package or binary to deploy"
            exit 1
          fi

      - name: Install jq (best-effort)
        run: |
          ssh ${SSH_OPTS} root@${VM_IP} << 'INSTALL_JQ'
          # Try to install jq - varies by OS
          # Verify jq actually works (not just exists — some VMs have empty binaries)
          if command -v jq >/dev/null 2>&1 && echo '{}' | jq . >/dev/null 2>&1; then
            echo "jq already available and functional"
            exit 0
          fi
          # Remove broken jq if present but non-functional
          if command -v jq >/dev/null 2>&1; then
            echo "jq exists but broken, forcing reinstall"
            rm -f "$(command -v jq)" 2>/dev/null || true
          fi
          # Try common package managers
          apk add --no-cache jq 2>/dev/null && echo '{}' | jq . >/dev/null 2>&1 && exit 0
          apt-get update -qq && apt-get install -y -qq jq 2>/dev/null && echo '{}' | jq . >/dev/null 2>&1 && exit 0
          dnf install -y jq 2>/dev/null && echo '{}' | jq . >/dev/null 2>&1 && exit 0
          yum install -y jq 2>/dev/null && echo '{}' | jq . >/dev/null 2>&1 && exit 0
          zypper install -y jq 2>/dev/null && echo '{}' | jq . >/dev/null 2>&1 && exit 0
          pacman -Sy --noconfirm jq 2>/dev/null && echo '{}' | jq . >/dev/null 2>&1 && exit 0
          xbps-install -Sy jq 2>/dev/null && echo '{}' | jq . >/dev/null 2>&1 && exit 0
          pkg install -y jq 2>/dev/null && echo '{}' | jq . >/dev/null 2>&1 && exit 0
          pkg_add jq 2>/dev/null && echo '{}' | jq . >/dev/null 2>&1 && exit 0
          pkgin -y install jq 2>/dev/null && echo '{}' | jq . >/dev/null 2>&1 && exit 0
          # Static binary fallback (works on any Linux/BSD x86_64)
          echo "Package jq install failed or broken, trying static binary..."
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64|amd64) JQ_ARCH="amd64" ;;
            aarch64|arm64) JQ_ARCH="arm64" ;;
            *) JQ_ARCH="" ;;
          esac
          if [ -n "$JQ_ARCH" ]; then
            OS=$(uname -s | tr '[:upper:]' '[:lower:]')
            case "$OS" in
              freebsd) OS="linux" ;; # jq linux static works on FreeBSD via compat
              *) ;;
            esac
            JQ_URL="https://github.com/jqlang/jq/releases/download/jq-1.7.1/jq-${OS}-${JQ_ARCH}"
            curl -fsSL "$JQ_URL" -o /usr/local/bin/jq 2>/dev/null || \
              fetch -o /usr/local/bin/jq "$JQ_URL" 2>/dev/null || \
              ftp -o /usr/local/bin/jq "$JQ_URL" 2>/dev/null || true
            chmod +x /usr/local/bin/jq 2>/dev/null
            if echo '{}' | /usr/local/bin/jq . >/dev/null 2>&1; then
              echo "Static jq installed successfully"
              exit 0
            fi
          fi
          echo "WARNING: Could not install functional jq"
          exit 0
          INSTALL_JQ

      - name: Install supervizio
        run: |
          ssh ${SSH_OPTS} root@${VM_IP} << 'INSTALL_CMD'
          set -e
          echo "=== Platform Info ==="
          uname -a
          echo ""

          # Set package source if available
          if [ -f "/tmp/supervizio.${{ matrix.pkg_ext }}" ] && [ -n "${{ matrix.pkg_ext }}" ]; then
            echo "Package available: /tmp/supervizio.${{ matrix.pkg_ext }}"
            export SUPERVIZIO_LOCAL_PKG="/tmp/supervizio.${{ matrix.pkg_ext }}"
          fi

          # Set binary fallback if available
          if [ -f "/tmp/supervizio" ]; then
            echo "Binary available: /tmp/supervizio"
            export SUPERVIZIO_LOCAL_BIN="/tmp/supervizio"
          fi

          if [ -z "${SUPERVIZIO_LOCAL_PKG:-}" ] && [ -z "${SUPERVIZIO_LOCAL_BIN:-}" ]; then
            echo "ERROR: No package or binary found"
            exit 1
          fi

          chmod +x /tmp/setup/install.sh
          /tmp/setup/install.sh
          INSTALL_CMD

      - name: Verify installation
        run: |
          ssh ${SSH_OPTS} root@${VM_IP} << 'VERIFY_CMD'
          set -e
          echo "=== Verify Installation ==="

          # Check binary exists
          if [ -f /usr/local/bin/supervizio ]; then
            echo "OK Binary found at /usr/local/bin/supervizio"
          else
            echo "FAIL Binary NOT found"
            exit 1
          fi

          # Check config directory
          if [ -d /etc/supervizio ]; then
            echo "OK Config directory exists"
          else
            echo "SKIP Config directory not found (may be OK for BSD)"
          fi

          # Check config file
          if [ -f /etc/supervizio/config.example.yaml ]; then
            echo "OK Example config found"
          else
            echo "SKIP Example config not found"
          fi

          # Check version
          echo ""
          echo "=== Version ==="
          /usr/local/bin/supervizio --version || echo "version check done"
          VERIFY_CMD

      - name: Validate probe
        run: |
          ssh ${SSH_OPTS} root@${VM_IP} << 'PROBE_CMD'
          set -e
          if command -v jq >/dev/null 2>&1; then
            chmod +x /tmp/validate-probe.sh
            /tmp/validate-probe.sh
          else
            echo "[WARN] jq not available, running basic probe test"
            OUTPUT=$(/usr/local/bin/supervizio --probe 2>&1) || {
              echo "ERROR: --probe failed"
              echo "Output: $OUTPUT"
              exit 1
            }
            echo "Probe output:"
            echo "$OUTPUT"
            echo "OK Probe returned output (jq not available for validation)"
          fi
          PROBE_CMD

      - name: Supervision scenarios
        run: |
          # Prove the supervisor REACTS correctly on this OS: crash→restart,
          # clean-exit→policy, never, max_retries, ignore-SIGTERM→SIGKILL, rlimit.
          # Self-contained battery (no extra binary) against the installed binary.
          ssh ${SSH_OPTS} root@${VM_IP} << 'BATTERY_CMD'
          set -e
          chmod +x /tmp/scenario-battery.sh
          /tmp/scenario-battery.sh /usr/local/bin/supervizio
          BATTERY_CMD

      - name: Uninstall supervizio
        run: |
          ssh ${SSH_OPTS} root@${VM_IP} << 'UNINSTALL_CMD'
          set -e
          echo "=== Uninstalling supervizio ==="
          export SUPERVIZIO_NON_INTERACTIVE=true
          chmod +x /tmp/setup/uninstall.sh
          /tmp/setup/uninstall.sh
          UNINSTALL_CMD

      - name: Verify clean uninstall
        run: |
          ssh ${SSH_OPTS} root@${VM_IP} << 'VERIFY_CLEAN'
          set -e
          echo "=== Verify Clean Uninstall ==="
          ERRORS=0

          # Check binary removed
          if [ -f /usr/local/bin/supervizio ]; then
            echo "FAIL Binary still present!"
            ERRORS=$((ERRORS + 1))
          else
            echo "OK Binary removed"
          fi

          # Check service files removed
          for svc in /etc/systemd/system/supervizio.service \
                     /usr/lib/systemd/system/supervizio.service \
                     /etc/init.d/supervizio \
                     /etc/sv/supervizio/run \
                     /etc/s6/supervizio/run \
                     /etc/dinit.d/supervizio \
                     /etc/rc.d/supervizio; do
            if [ -f "$svc" ]; then
              echo "FAIL Service file still present: $svc"
              ERRORS=$((ERRORS + 1))
            fi
          done

          if [ "$ERRORS" -gt 0 ]; then
            echo ""
            echo "WARNING: $ERRORS items not cleaned up"
            # Don't fail - some systems may retain config
          else
            echo "OK Clean uninstall verified"
          fi
          VERIFY_CLEAN

      - name: Release VM
        if: always()
        run: |
          chmod +x runner-template/.github/scripts/vm-release.sh
          runner-template/.github/scripts/vm-release.sh "${{ steps.vm.outputs.VMID || matrix.name }}"

      - name: Report status (result)
        if: always() && needs.resolve.outputs.sha != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.AGENT_REPO_TOKEN }}
        run: |
          [ -z "$GH_TOKEN" ] && { echo "AGENT_REPO_TOKEN not set, skipping"; exit 0; }
          STATE="success"
          DESC="Passed"
          if [ "${{ job.status }}" != "success" ]; then
            STATE="failure"
            DESC="Failed"
          fi
          curl -sf -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/supervizio/agent/statuses/${{ needs.resolve.outputs.sha }}" \
            -d "{\"state\":\"$STATE\",\"context\":\"e2e/vm/${{ matrix.name }}\",\"description\":\"$DESC\",\"target_url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"

  # ===========================================================================
  # VM CLEANUP: Reset all VMs to base snapshot
  # ===========================================================================

  vm-cleanup:
    name: VM Cleanup
    needs: [e2e-vm]
    if: always() && github.event.inputs.arm_only != 'true'
    runs-on: supervizio-runner
    timeout-minutes: 10
    env:
      PROXMOX_API_URL: "https://192.168.100.1:8006/api2/json"
      PVE_AUTH: "PVEAPIToken=${{ secrets.CI_RUNNER_API_TOKEN_ID }}=${{ secrets.CI_RUNNER_API_TOKEN_SECRET }}"
      NODE: ${{ secrets.PROXMOX_NODE }}
    steps:
      - name: Reset all VMs to base snapshot
        run: |
          echo "=== VM Cleanup: Resetting all VMs to base snapshot ==="

          # Validate Proxmox credentials
          if [ -z "$NODE" ] || [ "$PVE_AUTH" = "PVEAPIToken==" ]; then
            echo "WARNING: Proxmox secrets not configured, skipping VM cleanup"
            exit 0
          fi

          # Dynamically discover test VM VMIDs via Proxmox API.
          # Test VMs live in the 200-215 band (template_VMID + 100). We hard-scope
          # the reset to that band so infra VMs can NEVER be caught in the sweep:
          #   - ci-artifacts-zot (250): the CI artifact registry — stopping it makes
          #     zot "no route to host" and breaks agent CI + this very workflow.
          #   - mcp-service (301), runner-k3s (300): stateful infra.
          #   - dynamic/e2e (400-499), staging (500-522).
          # Name-prefix excludes (runner-/tpl-/e2e-/ci-artifacts-/mcp-/zot) are kept
          # as defense-in-depth in case the band ever changes.
          echo "Discovering test VMs (VMID 200-215)..."
          ALL_VMS=$(curl -sf -k --max-time 30 \
            -H "Authorization: ${PVE_AUTH}" \
            "${PROXMOX_API_URL}/nodes/${NODE}/qemu" 2>/dev/null) || {
            echo "ERROR: Failed to list VMs from Proxmox API"
            exit 1
          }

          # Filter: test-VM band 200-215 only, excluding infra/runner/template names
          VMIDS=$(echo "$ALL_VMS" | jq -r '
            .data[]
            | select((.vmid | tonumber) >= 200 and (.vmid | tonumber) <= 215)
            | select(.name | test("^(runner-|tpl-|e2e-|ci-artifacts-|mcp-)") | not)
            | select(.name | test("zot") | not)
            | select(.name | test("^[0-9]+$") | not)
            | .vmid
          ' 2>/dev/null | sort -n)

          if [ -z "$VMIDS" ]; then
            echo "WARNING: No test VMs found to reset"
            exit 0
          fi

          echo "Found test VMs:"
          echo "$ALL_VMS" | jq -r '
            .data[]
            | select((.vmid | tonumber) >= 200 and (.vmid | tonumber) <= 215)
            | select(.name | test("^(runner-|tpl-|e2e-|ci-artifacts-|mcp-)") | not)
            | select(.name | test("zot") | not)
            | select(.name | test("^[0-9]+$") | not)
            | "  \(.vmid) \(.name) (\(.status))"
          ' 2>/dev/null

          TOTAL=0
          FAILED=0
          for VMID in $VMIDS; do
            TOTAL=$((TOTAL + 1))
            VM_NAME=$(echo "$ALL_VMS" | jq -r ".data[] | select(.vmid == ${VMID}) | .name")
            echo ""
            echo "--- ${VM_NAME} (VMID ${VMID}) ---"

            echo "  Stopping VM ${VMID}..."
            curl -sf -k --max-time 30 \
              -H "Authorization: ${PVE_AUTH}" \
              -X POST "${PROXMOX_API_URL}/nodes/${NODE}/qemu/${VMID}/status/stop" \
              >/dev/null 2>&1 || true
            sleep 3

            echo "  Rolling back to 'base' snapshot..."
            if curl -sf -k --max-time 60 \
              -H "Authorization: ${PVE_AUTH}" \
              -X POST "${PROXMOX_API_URL}/nodes/${NODE}/qemu/${VMID}/snapshot/base/rollback" \
              >/dev/null 2>&1; then
              echo "  OK: ${VM_NAME} reset to base"
            else
              echo "  WARNING: Failed to reset ${VM_NAME} (VMID ${VMID})"
              FAILED=$((FAILED + 1))
            fi
          done

          echo ""
          echo "=== VM Cleanup Complete ==="
          echo "  Total VMs: ${TOTAL}"
          echo "  Failed: ${FAILED}"

          if [ "$FAILED" -gt 0 ]; then
            echo "  WARNING: ${FAILED} VM(s) failed to reset (non-fatal)"
          fi

  # ===========================================================================
  # REPORT: Aggregate results and post final commit status
  # ===========================================================================

  report:
    name: Report Results
    needs: [resolve, e2e-docker, e2e-docker-arm64, e2e-macos, e2e-macos-arm64, e2e-vm]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Aggregate results
        run: |
          echo "=== E2E Results ==="
          echo "e2e-docker:       ${{ needs.e2e-docker.result }}"
          echo "e2e-docker-arm64: ${{ needs.e2e-docker-arm64.result }}"
          echo "e2e-macos:        ${{ needs.e2e-macos.result }}"
          echo "e2e-macos-arm64:  ${{ needs.e2e-macos-arm64.result }}"
          echo "e2e-vm:           ${{ needs.e2e-vm.result }}"

      - name: Report final status
        if: needs.resolve.outputs.sha != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.AGENT_REPO_TOKEN }}
        run: |
          [ -z "$GH_TOKEN" ] && { echo "AGENT_REPO_TOKEN not set, skipping"; exit 0; }
          RESULTS=("${{ needs.e2e-docker.result }}" "${{ needs.e2e-docker-arm64.result }}" \
                   "${{ needs.e2e-macos.result }}" "${{ needs.e2e-macos-arm64.result }}" \
                   "${{ needs.e2e-vm.result }}")
          STATE="success"
          DESC="All E2E tests passed"
          for r in "${RESULTS[@]}"; do
            if [ "$r" = "failure" ]; then
              STATE="failure"
              DESC="E2E tests failed"
              break
            fi
          done
          curl -sf -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/supervizio/agent/statuses/${{ needs.resolve.outputs.sha }}" \
            -d "{\"state\":\"$STATE\",\"context\":\"e2e/runner-template\",\"description\":\"$DESC\",\"target_url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"

      - name: Dispatch callback to agent repo
        if: needs.resolve.outputs.sha != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.AGENT_REPO_TOKEN }}
        run: |
          [ -z "$GH_TOKEN" ] && { echo "AGENT_REPO_TOKEN not set, skipping"; exit 0; }
          RESULTS=("${{ needs.e2e-docker.result }}" "${{ needs.e2e-docker-arm64.result }}" \
                   "${{ needs.e2e-macos.result }}" "${{ needs.e2e-macos-arm64.result }}" \
                   "${{ needs.e2e-vm.result }}")
          STATE="success"
          for r in "${RESULTS[@]}"; do
            if [ "$r" = "failure" ]; then
              STATE="failure"
              break
            fi
          done
          curl -sf -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/supervizio/agent/dispatches" \
            -d "{\"event_type\":\"e2e-result\",\"client_payload\":{\"state\":\"$STATE\",\"sha\":\"${{ needs.resolve.outputs.sha }}\",\"run_id\":\"${{ github.run_id }}\",\"target_url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}}"
          echo "Dispatched e2e-result to supervizio/agent (state=$STATE)"

      - name: Summary
        if: always()
        run: |
          {
            echo "## E2E Test Results (runner-template)"
            echo ""
            echo "| Job | Result |"
            echo "|-----|--------|"
            echo "| Docker amd64 | \`${{ needs.e2e-docker.result }}\` |"
            echo "| Docker arm64 | \`${{ needs.e2e-docker-arm64.result }}\` |"
            echo "| macOS x86_64 | \`${{ needs.e2e-macos.result }}\` |"
            echo "| macOS ARM64 | \`${{ needs.e2e-macos-arm64.result }}\` |"
            echo "| VM E2E | \`${{ needs.e2e-vm.result }}\` |"
            echo ""
            echo "**Agent ref:** \`${{ needs.resolve.outputs.ref }}\`"
            echo "**Agent SHA:** \`${{ needs.resolve.outputs.sha }}\`"
            echo "**Agent run:** \`${{ needs.resolve.outputs.run_id }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if any E2E failed
        run: |
          RESULTS=("${{ needs.e2e-docker.result }}" "${{ needs.e2e-docker-arm64.result }}" \
                   "${{ needs.e2e-macos.result }}" "${{ needs.e2e-macos-arm64.result }}" \
                   "${{ needs.e2e-vm.result }}")
          for r in "${RESULTS[@]}"; do
            if [ "$r" = "failure" ]; then
              echo "FAILED: At least one E2E job failed"
              exit 1
            fi
          done
          echo "SUCCESS: All E2E tests passed"
